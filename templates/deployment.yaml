  
apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalogue
  namespace: roboshop
  labels:
    component: catalogue
    project: roboshop
    env: dev
spec:
  replicas: {{ .Values.deployement.replicas }}
  selector:
    matchLabels:
      component: catalogue
      project: roboshop
      env: dev
  template:
    metadata:
      labels:
        component: catalogue
        project: roboshop
        env: dev
    spec:
      containers:
        - name: catalogue
          image: {{ .Values.deployement.imageUrl}}:{{.Values.deployement.imageVersion}}
          envFrom:
            - configMapRef:
                name: catalogue